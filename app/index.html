<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Static File Analysis</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
  </head>
  <body>
    <header>
      <h1>Static File Analysis</h1>
    </header>
    <main>

      <form id="form-hash" method="get" enctype="text/html">
        <input type="text" name="hash" placeholder="SHA256"/>
        <button type="submit">Submit</button>
      </form>

      <form id="form-file" method="post" enctype="multipart/form-data">
        <input type="file" name="file"/>
        <button type="submit">Submit</button>
      </form>

      <div id="result-container"><p id="result-status">Submit file or hash lookup.</p></div>
    </main>
  </body>
  <script src="script.js"></script>
</html>
